<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Based Learning 2 -- Calculator</title>
    <style>
      .calculator__keys {
        display: grid;

        /* 1. Membuat 4 kolom dengan lebar yang sama */
        grid-template-columns: repeat(4, 1fr);

        /* 2. Memberikan jarak antar tombol */
        gap: 10px;

        /* 3. Memberikan ruang di dalam kontainer tombol */
        padding: 20px;

        /* 4. Opsional: Memastikan tombol mengisi ruang yang tersedia */
        align-items: stretch;
      }

      button.is-depressed {
        background-color: #999 !important;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="calculator">
      <div class="calculator__display">0</div>
      <div class="calculator__keys">
        <button class="key--operator" data-action="add">+</button>
        <button class="key--operator" data-action="subtract">-</button>
        <button class="key--operator" data-action="multiply">&times;</button>
        <button class="key--operator" data-action="divide">÷</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>0</button>
        <button data-action="decimal">.</button>
        <button data-action="clear">AC</button>
        <button class="key--equal" data-action="calculate">=</button>
      </div>
    </div>
    <script>
      const calculator = document.querySelector(".calculator");
      const keys = calculator.querySelector(".calculator__keys");
      const display = document.querySelector(".calculator__display");

      keys.addEventListener("click", (e) => {
        if (e.target.matches("button")) {
          const key = e.target;
          const action = key.dataset.action;
          const keyContent = key.textContent;
          const displayedNum = display.textContent;

          Array.from(key.parentNode.children).forEach((k) =>
            k.classList.remove("is-depressed"),
          );

          if (!action) {
            console.log("number key!");
          }
          if (
            action === "add" ||
            action === "subtract" ||
            action === "multiply" ||
            action === "divide"
          ) {
            console.log("operator key!");
          }
          if (action === "decimal") {
            console.log("decimal key!");
          }

          if (action === "clear") {
            console.log("clear key!");
          }

          if (action === "calculate") {
            console.log("equal key!");
          }

          if (!action) {
            if (displayedNum === "0") {
              display.textContent = keyContent;
            } else {
              display.textContent = displayedNum + keyContent;
            }
          }
          if (action === "decimal") {
            display.textContent = displayedNum + ".";
          }
          if (
            action === "add" ||
            action === "subtract" ||
            action === "multiply" ||
            action === "divide"
          ) {
            key.classList.add("is-depressed");
          }

          if (
            action === "add" ||
            action === "subtract" ||
            action === "multiply" ||
            action === "divide"
          ) {
            key.classList.add("is-depressed");
            // Add custom attribute
            calculator.dataset.previousKeyType = "operator";
          }
          {
            key.classList.add("is-depressed");
            // Add custom attribute
            calculator.dataset.previousKeyType = "operator";
          }
        }
      });
    </script>
  </body>
</html>
