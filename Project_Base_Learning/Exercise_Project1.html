<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Based Learning -- Loading Screen</title>
    <style>
      body {
        display: flex;
        text-align: center;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .loading {
        max-width: 50%;
        line-height: 1.4;
        font-size: bold;
        font-weight: bold;
      }

      .loading__author {
        font-weight: normal;
        font-size: 0.9rem;
        color: rgb(189, 189, 189, 1);
        margin: 0.6rem 0 2rem 0;
        display: block;
      }

      .loading__anim {
        width: 35px;
        height: 35px;
      }
    </style>
  </head>
  <body>
    <!-- <h1 class="head">Loading Screen Project</h1> -->
    <section class="loading">
      <p>
        For new sidebar colors, click your workspace name, then Preferences >
        Sidebar > Theme
        <span class="loading__author"> - Your friends at Slack</span>
        <span class="loading__anim"></span>
      </p>
    </section>
  </body>
</html>
