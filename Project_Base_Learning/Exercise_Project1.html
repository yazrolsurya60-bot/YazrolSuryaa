<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Based Learning -- Loading Screen</title>
    <style>
      body {
        display: flex;
        text-align: center;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .loading {
        max-width: 50%;
        line-height: 1.4;
        font-size: bold;
        font-weight: bold;
      }

      .loading__author {
        font-weight: normal;
        font-size: 0.9rem;
        color: rgb(189, 189, 189, 1);
        margin: 0.6rem 0 2rem 0;
        display: block;
      }

      .loading__anim {
        width: 35px;
        height: 35px;
        display: inline-block;
        border: 5px solid rgb(189, 189, 189, 0.25);
        border-left-color: rgba(3, 155, 229, 1);
        border-top-color: rgba(3, 159, 229, 1);
        border-radius: 50%;
        animation: rotate 600ms infinite linear;
      }

      @keyframes rotate {
        to {
          transform: rotate(1turn);
        }
      }

      h1 {
        background-color: skyblue;
        border-radius: 25%;
      }
    </style>
  </head>
  <body>
    <section class="loading">
      <h1>Loading Screen Project</h1>
      <p>
        Harap Tunggu Sebentar Karena Sedang ada Maintain Di Development
        <span class="loading__author"> - Sabar Yaaa --</span>
        <span class="loading__anim"></span>
      </p>
    </section>
  </body>
</html>
